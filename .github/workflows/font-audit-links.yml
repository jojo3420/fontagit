name: font-audit-links

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * 1"

permissions:
  contents: read

concurrency:
  group: font-audit-links
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install frozen pipeline dependencies
        run: uv sync --frozen
        working-directory: apps/pipeline
      - name: Scan public download links
        run: >-
          uv run python -m fontagit_pipeline font-audit-scan
          --kind download --source prod-public --out output/audit/scheduled
        working-directory: apps/pipeline
        env:
          SUPABASE_PROD_PUBLIC_URL: ${{ vars.PROD_PUBLIC_SUPABASE_URL }}
          SUPABASE_PROD_PUBLIC_ANON_KEY: ${{ secrets.PROD_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_PROD_PUBLIC_ALLOWLIST: ${{ vars.PROD_PUBLIC_SUPABASE_ALLOWLIST }}
      - name: Upload closed observation artifact
        uses: actions/upload-artifact@v4
        with:
          name: font-audit-observations
          path: |
            apps/pipeline/output/audit/scheduled/observations.json
            apps/pipeline/output/audit/scheduled/observations.sha256
          retention-days: 7
          if-no-files-found: error
